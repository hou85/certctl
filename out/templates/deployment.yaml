apiVersion: apps/v1
kind: Deployment
metadata:
  name: certctl
  namespace: certctl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certctl
  template:
    metadata:
      labels:
        app: certctl
    spec:
      containers:
      - name: certctl
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
        env:
        # TODO: adjust to certctl expected env vars
        - name: DATABASE_URL
          value: "postgres://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@postgres:5432/{{ .Values.postgres.database }}"
