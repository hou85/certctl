apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: certctl
  namespace: certctl

spec:
  hostnames:
    - {{ .Values.hostname | quote }}

  parentRefs:
    - name: main
      namespace: argocd
      sectionName: http

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: certctl
          port: 443

---

apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: certctl-backend-tls
  namespace: certctl

spec:
  targetRefs:
    - group: ""
      kind: Service
      name: certctl
      sectionName: https

  validation:
    hostname: {{ .Values.hostname | quote }}

    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: certctl-ca-bundle

---

apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: certctl-backend-tls
  namespace: certctl

spec:
  targetRefs:
    - group: ""
      kind: Service
      name: certctl
      sectionName: https

  validation:
    hostname: {{ .Values.hostname | quote }}

    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: certctl-ca-bundle
