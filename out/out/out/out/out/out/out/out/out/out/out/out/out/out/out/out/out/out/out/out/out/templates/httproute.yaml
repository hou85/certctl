apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: certctl
  namespace: certctl
spec:
  hostnames:
    - {{ .Values.hostname | quote }}
  parentRefs:
    - name: main
      namespace: argocd
      sectionName: http
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - name: certctl
        port: 80
