apiVersion: v1
kind: Service
metadata:
  name: certctl-tailscale
  namespace: {{ .Release.Namespace }}
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "certctl"

spec:
  type: LoadBalancer

  selector:
    app: certctl

  ports:
    - name: https
      port: 443
      targetPort: 8080
      protocol: TCP