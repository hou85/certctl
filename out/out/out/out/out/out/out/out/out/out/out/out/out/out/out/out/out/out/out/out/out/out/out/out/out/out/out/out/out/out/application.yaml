apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: certctl
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab-1.tail44be45.ts.net/infra/certctl.git
    targetRevision: HEAD
    path: apps/certctl
  destination:
    server: https://kubernetes.default.svc
    namespace: certctl
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
