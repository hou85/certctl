apiVersion: v1
kind: Service
metadata:
  name: certctl-ts
  namespace: {{ .Release.Namespace }}
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "certctl"

spec:
  type: ClusterIP

  selector:
    app: certctl

  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP