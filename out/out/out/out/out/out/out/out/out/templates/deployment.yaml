apiVersion: apps/v1
kind: Deployment
metadata:
  name: certctl
  namespace: {{ .Release.Namespace }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: certctl

  template:
    metadata:
      labels:
        app: certctl

    spec:
      volumes:
        - name: tls
          secret:
            secretName: certctl-tls

      containers:
        - name: certctl
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
          - name: CERTCTL_DATABASE_URL
            value: postgres://certctl:change-me@postgres:5432/certctl?sslmode=disable

          - name: CERTCTL_SERVER_HOST
            value: "0.0.0.0"

          - name: CERTCTL_SERVER_PORT
            value: "8080"

          - name: CERTCTL_SERVER_TLS_CERT_PATH
            value: /tls/tls.crt

          - name: CERTCTL_SERVER_TLS_KEY_PATH
            value: /tls/tls.key

          - name: CERTCTL_AUTH_TYPE
            value: api-key

          - name: CERTCTL_AUTH_SECRET
            valueFrom:
              secretKeyRef:
                name: certctl-secret
                key: auth-secret

          - name: CERTCTL_AGENT_BOOTSTRAP_TOKEN
            valueFrom:
              secretKeyRef:
                name: certctl-secret
                key: bootstrap-token

          - name: CERTCTL_AGENT_BOOTSTRAP_TOKEN_DENY_EMPTY
            value: "true"
                  volumeMounts:
                    - name: tls
                      mountPath: /tls
                      readOnly: true

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 20