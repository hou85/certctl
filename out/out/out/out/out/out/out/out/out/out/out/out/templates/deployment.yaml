apiVersion: apps/v1
kind: Deployment
metadata:
  name: certctl
  namespace: certctl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certctl
  template:
    metadata:
      labels:
        app: certctl
    spec:
      volumes:
        - name: tls
          secret:
            secretName: certctl-tls
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: certctl
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8443
        env:
        # TODO: adjust to certctl expected env vars
        - name: DATABASE_URL
          value: "postgres://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@postgres:5432/{{ .Values.postgres.database }}?sslmode=disable"
        - name: CERTCTL_SERVER_ADDR
          value: "8443"

        - name: CERTCTL_SERVER_TLS_CERT_PATH
          value: /tls/tls.crt

        - name: CERTCTL_SERVER_TLS_KEY_PATH
          value: /tls/tls.key

        - name: CERTCTL_AUTH_TYPE
          value: api-key

        - name: CERTCTL_AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: certctl-secret
              key: auth-secret

        - name: CERTCTL_AGENT_BOOTSTRAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: certctl-secret
              key: bootstrap-token

        - name: CERTCTL_AGENT_BOOTSTRAP_TOKEN_DENY_EMPTY
          value: "true"

        volumeMounts:
          - name: tls
            mountPath: /tls
            readOnly: true
