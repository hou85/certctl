apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: certctl
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    helm:
      parameters:
        - name: tailscale.hostname
          value: "certctl"
        - name: tailscale.tailnet
          value: "tail44be45.ts.net"
    repoURL: https://gitlab-1.tail44be45.ts.net/infra/certctl.git
    targetRevision: HEAD
    path: apps/certctl
  destination:
    server: https://kubernetes.default.svc
    namespace: certctl
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
