apiVersion: v1
kind: Service
metadata:
  name: dex-tailscale
  namespace: {{ .Release.Namespace }}
  annotations:
    tailscale.com/hostname: {{ .Values.tailscale.hostname | quote }}
    tailscale.com/https: "true"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: dex
  ports:
    - name: http
      port: 80
      targetPort: 5556
      protocol: TCP
      appProtocol: http
