{{- $dexFqdn := printf "%s.%s" .Values.tailscale.hostname .Values.tailscale.tailnet -}}
{{- $certctlFqdn := printf "%s.%s" .Values.certctl.hostname .Values.certctl.tailnet -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    issuer: https://{{ $dexFqdn }}

    storage:
      type: kubernetes
      config:
        inCluster: true

    web:
      http: 0.0.0.0:5556

    oauth2:
      skipApprovalScreen: true

    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $GITHUB_CLIENT_ID
          clientSecret: $GITHUB_CLIENT_SECRET
          redirectURI: https://{{ $dexFqdn }}/callback
          loadAllGroups: false
          useLoginAsID: false

    staticClients:
      - id: certctl
        name: certctl
        secretEnv: CERTCTL_CLIENT_SECRET
        redirectURIs:
          - https://{{ $certctlFqdn }}/api/v1/auth/oidc/callback
