image:
  repository: ghcr.io/dexidp/dex
  tag: v2.41.1
  pullPolicy: IfNotPresent

replicas: 1

# Hostname Tailscale (label court — Tailscale construit le FQDN)
# Le hostname complet sera <hostname>.<tailnet>, utilisé dans la HTTPRoute
tailscale:
  hostname: dex
  tailnet: tail44be45.ts.net

# Hostname certctl (client OIDC) pour construire la redirectURI du staticClient Dex
certctl:
  hostname: certctl
  tailnet: tail44be45.ts.net

# Référence à la Gateway Envoy qui route le trafic vers Dex
# Cette Gateway doit accepter les routes cross-namespace
# (spec.listeners[].allowedRoutes.namespaces.from: All)
gateway:
  name: main
  namespace: argocd
  sectionName: http

# Nom du Secret contenant les credentials (créé hors GitOps par bootstrap-secrets.sh)
secretName: dex-secrets
