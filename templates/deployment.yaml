apiVersion: apps/v1
kind: Deployment
metadata:
  name: certctl
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certctl
  template:
    metadata:
      labels:
        app: certctl
    spec:
      volumes:
        - name: tls
          secret:
            secretName: certctl-tls

      containers:
        - name: certctl
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: 8080
              protocol: TCP

          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password

            - name: CERTCTL_DATABASE_URL
              value: postgres://{{ .Values.postgres.username }}:$(POSTGRES_PASSWORD)@postgres:5432/{{ .Values.postgres.database }}?sslmode=disable

            - name: CERTCTL_SERVER_HOST
              value: "0.0.0.0"

            - name: CERTCTL_SERVER_PORT
              value: "8080"

            - name: CERTCTL_SERVER_TLS_CERT_PATH
              value: /tls/tls.crt

            - name: CERTCTL_SERVER_TLS_KEY_PATH
              value: /tls/tls.key

            - name: CERTCTL_AUTH_TYPE
              value: none
              
            - name: CERTCTL_DEMO_MODE_ACK
              value: "true"

            - name: CERTCTL_DEMO_MODE_ACK_TS
              value: $(date +%s)

            - name: CERTCTL_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: certctl-secret
                  key: auth-secret

            - name: CERTCTL_AGENT_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: certctl-secret
                  key: bootstrap-token

            - name: CERTCTL_AGENT_BOOTSTRAP_TOKEN_DENY_EMPTY
              value: "true"

          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true

          startupProbe:
            httpGet:
              path: /ready
              port: 8080
              scheme: HTTPS
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
              scheme: HTTPS
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTPS
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
