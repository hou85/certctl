{{- $secretName := "certctl-tls" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if $existing -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: kubernetes.io/tls
data:
  tls.crt: {{ index $existing.data "tls.crt" }}
  tls.key: {{ index $existing.data "tls.key" }}
{{- else -}}
{{- $altNames := list
    "certctl"
    (printf "certctl.%s" .Release.Namespace)
    (printf "certctl.%s.svc" .Release.Namespace)
    (printf "certctl.%s.svc.cluster.local" .Release.Namespace)
    .Values.tailscale.hostname
-}}
{{- $cert := genSelfSignedCert .Values.tailscale.hostname nil $altNames 3650 -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end -}}