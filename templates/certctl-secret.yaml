apiVersion: v1
kind: Secret
metadata:
  name: certctl-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  auth-secret: {{ required "server.auth.apiKey is required" .Values.server.auth.apiKey | quote }}
  bootstrap-token: {{ .Values.server.auth.bootstrapToken | default (randAlphaNum 32) | quote }}