apiVersion: v1
kind: Service
metadata:
  name: certctl-tailscale
  namespace: {{ .Release.Namespace }}
  annotations:
    tailscale.com/hostname: {{ .Values.tailscale.hostname | quote }}
    tailscale.com/https: "true"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: certctl
  ports:
    - name: https
      port: 443
      targetPort: 8080
      protocol: TCP
      appProtocol: https